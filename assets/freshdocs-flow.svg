<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="460" viewBox="0 0 1200 460" role="img" aria-labelledby="title desc">
  <title id="title">Freshdocs local documentation context flow</title>
  <desc id="desc">Official sources flow into version resolution, a local SQLite cache, and compact agent context with visible trust signals.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#07111f"/>
      <stop offset="0.55" stop-color="#0b1726"/>
      <stop offset="1" stop-color="#111827"/>
    </linearGradient>
    <linearGradient id="mint" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#7dd3fc"/>
      <stop offset="0.55" stop-color="#5eead4"/>
      <stop offset="1" stop-color="#fbbf24"/>
    </linearGradient>
    <filter id="softGlow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <pattern id="grid" width="38" height="38" patternUnits="userSpaceOnUse">
      <path d="M 38 0 L 0 0 0 38" fill="none" stroke="#223047" stroke-width="1" opacity="0.35"/>
    </pattern>
  </defs>

  <rect width="1200" height="460" rx="24" fill="url(#bg)"/>
  <rect width="1200" height="460" rx="24" fill="url(#grid)" opacity="0.55"/>
  <path d="M72 336 C228 210 331 365 470 244 S709 143 850 252 S1018 334 1128 199" fill="none" stroke="url(#mint)" stroke-width="3" opacity="0.5" filter="url(#softGlow)"/>

  <g transform="translate(64 64)">
    <rect width="230" height="292" rx="18" fill="#111827" stroke="#334155" stroke-width="1.5"/>
    <circle cx="24" cy="24" r="5" fill="#fb7185"/>
    <circle cx="43" cy="24" r="5" fill="#fbbf24"/>
    <circle cx="62" cy="24" r="5" fill="#34d399"/>
    <text x="28" y="78" fill="#e5edf7" font-family="ui-sans-serif, system-ui, -apple-system, Segoe UI, sans-serif" font-size="24" font-weight="700">Official docs</text>
    <text x="28" y="107" fill="#94a3b8" font-family="ui-sans-serif, system-ui, -apple-system, Segoe UI, sans-serif" font-size="15">README, changelog,</text>
    <text x="28" y="130" fill="#94a3b8" font-family="ui-sans-serif, system-ui, -apple-system, Segoe UI, sans-serif" font-size="15">llms.txt, registries</text>
    <g transform="translate(28 164)">
      <rect width="60" height="74" rx="10" fill="#1f2937" stroke="#60a5fa"/>
      <path d="M18 21 h24 M18 36 h24 M18 51 h18" stroke="#dbeafe" stroke-width="4" stroke-linecap="round"/>
      <path d="M45 0 v22 h15" fill="none" stroke="#60a5fa" stroke-width="4"/>
      <rect x="88" y="7" width="86" height="13" rx="6" fill="#475569"/>
      <rect x="88" y="36" width="118" height="13" rx="6" fill="#334155"/>
      <rect x="88" y="65" width="96" height="13" rx="6" fill="#334155"/>
    </g>
  </g>

  <g transform="translate(351 82)">
    <rect width="196" height="256" rx="18" fill="#0f172a" stroke="#475569" stroke-width="1.5"/>
    <circle cx="98" cy="70" r="42" fill="#172554" stroke="#60a5fa" stroke-width="3"/>
    <path d="M98 41 v29 l22 16" fill="none" stroke="#bfdbfe" stroke-width="6" stroke-linecap="round" stroke-linejoin="round"/>
    <path d="M61 147 h74" stroke="#5eead4" stroke-width="8" stroke-linecap="round"/>
    <path d="M61 179 h103" stroke="#334155" stroke-width="8" stroke-linecap="round"/>
    <path d="M61 211 h83" stroke="#334155" stroke-width="8" stroke-linecap="round"/>
    <text x="34" y="132" fill="#f8fafc" font-family="ui-sans-serif, system-ui, -apple-system, Segoe UI, sans-serif" font-size="22" font-weight="700">Version pin</text>
  </g>

  <g transform="translate(613 72)">
    <rect width="244" height="276" rx="20" fill="#102019" stroke="#34d399" stroke-width="1.5"/>
    <ellipse cx="122" cy="80" rx="74" ry="24" fill="#064e3b" stroke="#6ee7b7" stroke-width="4"/>
    <path d="M48 80 v78 c0 14 33 25 74 25s74-11 74-25V80" fill="#052e2b" stroke="#2dd4bf" stroke-width="4"/>
    <ellipse cx="122" cy="158" rx="74" ry="25" fill="#065f46" stroke="#5eead4" stroke-width="4"/>
    <text x="48" y="230" fill="#ecfeff" font-family="ui-sans-serif, system-ui, -apple-system, Segoe UI, sans-serif" font-size="24" font-weight="700">Local cache</text>
    <text x="48" y="257" fill="#a7f3d0" font-family="ui-sans-serif, system-ui, -apple-system, Segoe UI, sans-serif" font-size="15">SQLite FTS after sync</text>
    <path d="M186 37 l23 9 v31 c0 27-20 43-23 45-4-2-24-18-24-45V46z" fill="#064e3b" stroke="#a7f3d0" stroke-width="3"/>
    <path d="M175 78 l9 9 18-25" fill="none" stroke="#d1fae5" stroke-width="6" stroke-linecap="round" stroke-linejoin="round"/>
  </g>

  <g transform="translate(929 64)">
    <rect width="207" height="292" rx="18" fill="#111827" stroke="#334155" stroke-width="1.5"/>
    <circle cx="24" cy="24" r="5" fill="#fb7185"/>
    <circle cx="43" cy="24" r="5" fill="#fbbf24"/>
    <circle cx="62" cy="24" r="5" fill="#34d399"/>
    <text x="28" y="78" fill="#f8fafc" font-family="ui-sans-serif, system-ui, -apple-system, Segoe UI, sans-serif" font-size="24" font-weight="700">Agent context</text>
    <rect x="28" y="112" width="151" height="34" rx="8" fill="#1f2937" stroke="#38bdf8"/>
    <rect x="28" y="162" width="128" height="12" rx="6" fill="#60a5fa"/>
    <rect x="28" y="190" width="151" height="12" rx="6" fill="#334155"/>
    <rect x="28" y="218" width="105" height="12" rx="6" fill="#f59e0b"/>
    <rect x="28" y="246" width="137" height="12" rx="6" fill="#34d399"/>
    <path d="M151 111 l22 9 v32 c0 27-19 43-22 45-4-2-23-18-23-45v-32z" fill="#064e3b" stroke="#a7f3d0" stroke-width="3"/>
    <path d="M140 153 l9 9 17-25" fill="none" stroke="#d1fae5" stroke-width="5" stroke-linecap="round" stroke-linejoin="round"/>
  </g>

  <g fill="none" stroke-linecap="round" stroke-linejoin="round">
    <path d="M304 210 H341" stroke="#67e8f9" stroke-width="4"/>
    <path d="M330 199 l13 11-13 11" stroke="#67e8f9" stroke-width="4"/>
    <path d="M558 210 H602" stroke="#5eead4" stroke-width="4"/>
    <path d="M591 199 l13 11-13 11" stroke="#5eead4" stroke-width="4"/>
    <path d="M870 210 H918" stroke="#fbbf24" stroke-width="4"/>
    <path d="M907 199 l13 11-13 11" stroke="#fbbf24" stroke-width="4"/>
  </g>

  <g transform="translate(78 389)">
    <rect width="1044" height="38" rx="19" fill="#0f172a" stroke="#26364f"/>
    <circle cx="30" cy="19" r="8" fill="#5eead4"/>
    <text x="49" y="25" fill="#cbd5e1" font-family="ui-sans-serif, system-ui, -apple-system, Segoe UI, sans-serif" font-size="15">Visible versions</text>
    <circle cx="224" cy="19" r="8" fill="#60a5fa"/>
    <text x="243" y="25" fill="#cbd5e1" font-family="ui-sans-serif, system-ui, -apple-system, Segoe UI, sans-serif" font-size="15">Checked dates</text>
    <circle cx="418" cy="19" r="8" fill="#fbbf24"/>
    <text x="437" y="25" fill="#cbd5e1" font-family="ui-sans-serif, system-ui, -apple-system, Segoe UI, sans-serif" font-size="15">Explicit misses</text>
    <circle cx="612" cy="19" r="8" fill="#34d399"/>
    <text x="631" y="25" fill="#cbd5e1" font-family="ui-sans-serif, system-ui, -apple-system, Segoe UI, sans-serif" font-size="15">Local-first by default</text>
    <circle cx="841" cy="19" r="8" fill="#93c5fd"/>
    <text x="860" y="25" fill="#cbd5e1" font-family="ui-sans-serif, system-ui, -apple-system, Segoe UI, sans-serif" font-size="15">Prompt-ready output</text>
  </g>
</svg>
